name: Testing
on:
  # push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-python:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v2

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: lint
        name: Lint
        run: pipenv run flake8 ./

  test-python:
    name: Test Python code
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install Python and dependencies
        uses: ./.github/actions/install

      - id: cache-playwright
        name: Cache Playwright
        uses: actions/cache@v2
        with:
          path: ~/.cache/ms-playwright/
          key: ${{ runner.os }}-browsers

      - id: install-playwright
        name: Install Playwright
        run: |
            pipenv run python -m playwright install
            pipenv run python -m playwright install-deps
        shell: bash

      - id: test
        name: Run tests
        run: pipenv run xvfb-run pytest --junit-xml=.test_report.xml tests

      - id: generate-summary
        uses: test-summary/action@v1
        with:
          paths: .test_report.xml
          output: test-summary.md
          show: all
        if: always()

      - name: Upload test summary
        uses: actions/upload-artifact@v3
        with:
          name: test-summary
          path: test-summary.md
        if: always()

      - name: Comment PR
        uses: shellingford330/pr-comment-action@v0.0.6
        with:
          owner: ${{ github.event.repository.owner.login }}
          repo: ${{ github.event.repository.name }}
          pr_number: ${{ github.event.issue.number }}
          filepath: test-summary.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  static-type-check:
    name: Static type check
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: mypy
        name: mypy
        run: pipenv run mypy ./
