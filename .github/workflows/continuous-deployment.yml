name: Continuous deployment

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6

      - id: check-ruff
        name: Check with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --verbose"

      - id: format-ruff
        name: Format with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --verbose"

  type-check:
    name: Verify static typing
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - id: install-python-dependencies
        name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - id: type-check
        name: Run type check
        timeout-minutes: 10
        run: uv run ty check

  test-python:
    name: Test Python code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: install-uv
        name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - id: install-python
        name: Install Python
        run: uv python install ${{ matrix.python }}

      - id: install-python-dependencies
        name: Install Python dependencies
        run: uv sync --extra test --python ${{ matrix.python }}

      - id: cache-playwright
        name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright/
          key: ${{ runner.os }}-playwright-${{ matrix.python }}

      - id: install-playwright
        name: Install Playwright
        run: uv run --python ${{ matrix.python }} python -m playwright install

      - id: tests
        name: Run tests
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_COLLECTION: ${{ secrets.IA_COLLECTION }}
        run: >-
          uv run --python ${{ matrix.python }}
          xvfb-run pytest tests -sv --cov -n auto --vcr-record=none

  build:
    name: Build release candidate
    runs-on: ubuntu-latest
    needs: [lint-python, type-check, test-python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: install-uv
        name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - id: build
        name: Build releases
        run: uv build --sdist --wheel

      - id: save
        name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate
          path: ./dist
          if-no-files-found: error

  release:
    name: PyPI release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - id: fetch
        name: Fetch artifact
        uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: ./dist

      - id: publish
        name: Publish release
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          verify-metadata: false
