name: Update website

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: site
  cancel-in-progress: true

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6

      - id: install-uv
        name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - id: install-python-dependencies
        name: Install Python dependencies
        run: uv sync --extra docs --frozen

      - id: render-templates
        name: Render site templates
        run: uv run make site
        shell: bash

      - id: build-site
        name: Build site
        run: cd _site && uv run make html
        shell: bash

      - id: configure-aws
        name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.PALEWIRE_DOCS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PALEWIRE_DOCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - id: npm-deploy
        name: Upload the prepared files
        uses: datadesk/delivery-deploy-action@v1
        with:
          bucket: ${{ secrets.PALEWIRE_DOCS_AWS_BUCKET }}
          base-path: news-homepages
          dir: _site/_build/html/
          should-cache: false
          use-accelerate-endpoint: false
          public: true
