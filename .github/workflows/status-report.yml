name: Status report
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  calculate:
    name: Calculate
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install-chromedriver
        name: Install chromedriver
        run: |
          sudo apt update
          sudo apt install chromium-chromedriver
        shell: bash

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: run-notebook
        name: Run notebook
        run: pipenv run jupyter execute notebooks/status-report.ipynb
        shell: bash

      - id: commit
        name: Commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config pull.rebase false
          git status
          git pull origin $GITHUB_REF
          git add ./notebooks
          git commit -m "Status report data update" --author="palewire <palewire@users.noreply.github.com>" && git push || true
        shell: bash
