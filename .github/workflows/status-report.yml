name: Status report
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  calculate:
    name: Calculate
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install-chromedriver
        name: Install chromedriver
        run: |
          sudo apt update
          sudo apt --only-upgrade install google-chrome-stable
          sudo apt -yqq install chromium-chromedriver
        shell: bash

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: run-notebook
        name: Run notebook
        run: pipenv run jupyter execute notebooks/status-report.ipynb
        shell: bash

      - id: commit
        name: Commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config pull.rebase false
          git status
          git pull origin $GITHUB_REF
          git add ./notebooks
          git commit -m "Status report data update" --author="palewire <palewire@users.noreply.github.com>" && git push || true
        shell: bash

  tweet:
    name: Tweet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [calculate]
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: tweet
        name: Tweet
        uses: ./.github/actions/tweet
        with:
          consumer-key: ${{ secrets.TWITTER_CONSUMER_KEY }}
          consumer-secret: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          access-token-key: ${{ secrets.TWITTER_ACCESS_TOKEN_KEY }}
          access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          command: status-report
