name: "Archive a single site"

on:
  workflow_dispatch:
    inputs:
      handle:
        description: 'Site handle'
        required: true
        type: string
      tweet:
        description: 'Tweet'
        required: true
        type: boolean
        default: false

jobs:
  archive-site:
    name: Archive bundle
    uses: palewire/news-homepages/.github/workflows/reusable-archive-single-site-workflow.yml@main
    with:
      handle: ${{ inputs.handle }}
    secrets: inherit
