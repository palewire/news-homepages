name: Extract

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: extract
  cancel-in-progress: true

jobs:
  download-items:
    name: Download items
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: download-files
        name: Download Internet Archive items
        run: pipenv run python -m newshomepages.extract download-items;
        shell: bash
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_COLLECTION: ${{ secrets.IA_COLLECTION }}

      - id: commit
        name: Commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config pull.rebase false
          git pull origin $GITHUB_REF
          git add ./extracts
          git commit -m "Update extracts" --author="palewire <palewire@users.noreply.github.com>" && git push || true
        shell: bash

  consolidate-items:
    name: Consolidate items
    runs-on: ubuntu-latest
    needs: [download-items]
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: consolidate-files
        name: Consolidate Internet Archive metadata
        run: pipenv run python -m newshomepages.extract consolidate;
        shell: bash

      - id: commit
        name: Commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config pull.rebase false
          git pull origin $GITHUB_REF
          git add ./extracts
          git commit -m "Update extracts" --author="palewire <palewire@users.noreply.github.com>" && git push || true
        shell: bash

  download-lighthouse:
    name: Download Lighthouse
    runs-on: ubuntu-latest
    needs: [consolidate-items]
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: download-lighthouse
        name: Download Lighthouse files
        run: pipenv run python -m newshomepages.extract download-lighthouse --days=7 --output-path=./extracts/csv/lighthouse-sample.csv;
        shell: bash

      - id: commit
        name: Commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config pull.rebase false
          git pull origin $GITHUB_REF
          git add ./extracts
          git commit -m "Update extracts" --author="palewire <palewire@users.noreply.github.com>" && git push || true
        shell: bash
