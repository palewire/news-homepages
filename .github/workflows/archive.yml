name: Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */4 * * *"

jobs:
  sources:
    name: Source list
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install Python dependencies
        uses: ./.github/actions/install

      - id: create-handles-json
        name: Create handles JSON
        run:  pipenv run python -m newshomepages.screenshot get-handle-json
        shell: bash

      - id: set-matrix
        name: Export handles list
        run: echo "::set-output name=handle_matrix::$(cat handles.json | jq -c)"
    outputs:
      handle_matrix: ${{ steps.set-matrix.outputs.handle_matrix }}

  jpg:
    name: JPG
    runs-on: ubuntu-20.04
    timeout-minutes: 15
    needs: sources
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install Python dependencies
        uses: ./.github/actions/install

      - id: screenshot
        name: Screenshot
        uses: ./.github/actions/screenshot
        with:
          source: ${{ matrix.source }}
          command: single

  accessibility:
    name: a11y
    runs-on: ubuntu-latest
    needs: sources
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: save-page
        name: Save the accessibility tree
        uses: ./.github/actions/accessibility
        with:
          source: ${{ matrix.source }}
          command: single

  hyperlinks:
    name: Hyperlinks
    runs-on: ubuntu-latest
    needs: sources
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: save-page
        name: Save hyperlinks
        uses: ./.github/actions/hyperlinks
        with:
          source: ${{ matrix.source }}
          command: single

  wayback:
    name: Wayback Machine
    runs-on: ubuntu-latest
    needs: sources
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: save-page
        name: Save in Wayback Machine
        uses: ./.github/actions/wayback
        with:
          source: ${{ matrix.source }}
          command: single
          access-key: ${{ secrets.ia-access-key }}
          secret-key: ${{ secrets.ia-secret-key }}

  archive:
    name: Post to archive.org
    needs: [jpg,accessibility,hyperlinks,sources]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: install
        name: Install
        uses: ./.github/actions/install

      - id: archive
        name: Post
        uses: ./.github/actions/archive
        with:
          source: ${{ matrix.source }}
          command: single
          ia-access-key: ${{ secrets.IA_ACCESS_KEY }}
          ia-secret-key: ${{ secrets.IA_SECRET_KEY }}
          ia-collection: ${{ secrets.IA_COLLECTION }}

  commit:
    name: Commit to GitHub
    runs-on: ubuntu-latest
    needs: [sources,jpg]
    strategy:
      matrix:
        source: ${{ fromJson(needs.sources.outputs.handle_matrix) }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v3

      - id: commit
        name: Commit
        uses: ./.github/actions/commit
