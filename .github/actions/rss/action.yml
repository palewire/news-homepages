name: Docs
description: Update RSS feeds

runs:
  using: "composite"
  steps:
    - id: site-rss
      name: Update site RSS
      run: pipenv run python -m newshomepages.rss;
      shell: bash

    - id: commit
      name: Commit
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config pull.rebase false
        git status
        git pull origin $GITHUB_REF
        git add ./docs/_extra/rss
        git commit -m "Update RSS" --author="palewire <palewire@users.noreply.github.com>" && git push || true
      shell: bash
