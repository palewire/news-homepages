name: Docs
description: Update RSS feeds

runs:
  using: "composite"
  steps:
    - id: install
      name: Install
      uses: ./.github/actions/install

    - id: site-rss
      name: Update site RSS
      run: pipenv run python -m newshomepages.rss sites
      shell: bash

    - id: site-opml
      name: Update site OPML
      run: pipenv run python -m newshomepages.rss opml
      shell: bash

    - id: bundle-rss
      name: Update bundle RSS
      run: pipenv run python -m newshomepages.rss bundles
      shell: bash

    - id: configure-github
      name: Configure GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config pull.rebase false
      shell: bash

    - id: git-status
      name: Git status
      run: git status
      shell: bash

    - id: git-pull
      name: Git pull
      run: git pull origin $GITHUB_REF
      shell: bash

    - id: git-add
      name: Git add
      run: git add ./docs/_extra/rss
      shell: bash

    - id: git-commit
      name: Git commit
      run: git commit -m "Update RSS" --author="palewire <palewire@users.noreply.github.com>" && git push || true
      shell: bash
