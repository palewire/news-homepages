name: Screenshot
description: Snap a JPG of the provided site

inputs:
  source:
    description: “The site handle to screenshot”
    required: true
  command:
    description: "The screenshot.py command to run"
    required: true

runs:
  using: "composite"
  steps:
    - id: install-extras
      name: Install Ubuntu codecs and extras
      run: |
        sudo apt update
        sudo apt install xvfb
      shell: bash

    - id: cache-playwright
      name: Cache Playwright browsers
      uses: actions/cache@v2
      with:
        path: ~/.cache/ms-playwright/
        key: ${{ runner.os }}-browsers

    - id: install-playwright
      name: Install Playwright dependencies
      run: pipenv run playwright install --with-deps chromium
      shell: bash

    - id: headless
      name: Take headless screenshot
      run: xvfb-run --auto-servernum pipenv run python -m newshomepages.screenshot headless
      shell: bash

    - id: headless
      name: Take headful screenshot
      run: xvfb-run --auto-servernum pipenv run python -m newshomepages.screenshot headful
      shell: bash

    - id: save
      name: Save artifact
      uses: actions/upload-artifact@v2
      with:
        name: screenshots
        path: _dist
        if-no-files-found: error
