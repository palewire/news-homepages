name: Commit
description: Save the latest screenshots to the repository

inputs:
  download-items-command:
    description: The command to use when downloading items
    required: true
  access-key:
    description: An API key with permission to post to archive.org
    required: true
  secret-key:
    description: An API secret with permission to post to archive.org
    required: true
  collection:
    description: The identifier of the target archive.org collection
    required: true

runs:
  using: "composite"
  steps:
    - id: install
      name: Install Python dependencies
      uses: ./.github/actions/install

    - id: configure-github
      name: Configure GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config pull.rebase false
      shell: bash

    - id: git-pull
      name: Git pull
      run: git pull origin $GITHUB_REF
      shell: bash

    - uses: actions/download-artifact@v3
      with:
        name: screenshots
        path: ./latest-screenshots

    - uses: actions/download-artifact@v3
      with:
        name: archive
        path: ./newshomepages/sources/latest/

    - id: git-add
      name: Git add latest images
      run: git add ./latest-screenshots/*.jpg
      shell: bash

    - id: git-commit
      name: Git commit
      run: git commit -m "Latest screenshots" --author="palewire <palewire@users.noreply.github.com>" && git push || true
      shell: bash

    - id: git-add-archive
      name: Git add latest files
      run: pipenv run python -m newshomepages.extract latest-files
      shell: bash

    - id: git-commit-archive
      name: Git latest files
      run: |
        git add ./newshomepages/sources/latest/*.json
        git add ./extracts/csv/*.csv
        git commit -m "Latest archive.org urls" --author="palewire <palewire@users.noreply.github.com>" || true
        git pull origin $GITHUB_REF
      shell: bash

    - id: download-items
      name: Download archive.org items
      run: pipenv run python -m newshomepages.extract download-items ${{ inputs.download-items-command }}
      shell: bash
      env:
        IA_ACCESS_KEY: ${{ inputs.access-key }}
        IA_SECRET_KEY: ${{ inputs.secret-key }}
        IA_COLLECTION:  ${{ inputs.collection }}

    - id: git-commit-items
      name: Commit archive.org items
      run: |
          git add ./extracts
          git commit -m "Update archive.org items" --author="palewire <palewire@users.noreply.github.com>" || true
          git pull origin $GITHUB_REF
      shell: bash
