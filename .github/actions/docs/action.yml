runs:
  using: "composite"
  steps:
    - id: update-docs
      name: Update documentation
      run: pipenv run python -m newshomepages.docs
      shell: bash

    - id: commit
      name: Commit
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config pull.rebase false
        git status
        git pull origin $GITHUB_REF
        git add ./docs
        git commit -m "Update docs" --author="palewire <palewire@users.noreply.github.com>" && git push || true
      shell: bash
