name: Docs
description: Update templated documentation pages

runs:
  using: "composite"
  steps:
    - id: latest-screenshots
      name: Update latest screenshots
      run: pipenv run python -m newshomepages.docs latest-screenshots;
      shell: bash

    - id: source-list
      name: Update source list
      run: pipenv run python -m newshomepages.docs source-list;
      shell: bash

    - id: site-detail
      name: Update site detail
      run: pipenv run python -m newshomepages.docs site-detail;
      shell: bash

    - id: configure-github
      name: Configure GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config pull.rebase false
      shell: bash

    - id: git-status
      name: Git status
      run: git status
      shell: bash

    - id: git-pull
      name: Git pull
      run: git pull origin $GITHUB_REF
      shell: bash

    - id: git-add
      name: Git add
      run: |
        git add ./docs/latest.md
        git add ./docs/sources.md
        git add ./docs/sites
      shell: bash

    - id: git-commit
      name: Git commit
      run: git commit -m "Update docs" --author="palewire <palewire@users.noreply.github.com>" && git push || true
      shell: bash
